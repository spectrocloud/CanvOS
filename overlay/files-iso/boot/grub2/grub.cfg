search --file --set=root /boot/kernel.xz
set default={{DEFAULT_ENTRY}}
set timeout=5
set timeout_style=menu
set linux=linux
set initrd=initrd
if [ "${grub_platform}" = "efi" ]; then
    echo "Please press 't' to show the boot menu on this console"
fi
set font=($root)/boot/${grub_cpu}/loader/grub2/fonts/unicode.pf2
if [ -f ${font} ];then
    loadfont ${font}
fi
menuentry "Palette eXtended Kubernetes Edge Installer" --class os --unrestricted {
    echo Loading kernel...
    $linux ($root)/boot/kernel cdroot root=live:CDLABEL=COS_LIVE rd.live.dir=/ rd.live.squashimg=rootfs.squashfs net.ifnames=1 console=tty1 console=ttyS0 rd.cos.disable vga=795 nomodeset nodepair.enable selinux=0 rd.live.overlay.overlayfs rd.immucore.sysrootwait=600 systemd.unified_cgroup_hierarchy=1
    echo Loading initrd...
    $initrd ($root)/boot/initrd
}

menuentry "Palette eXtended Kubernetes Edge Installer (manual)" --class os --unrestricted {
    echo Loading kernel...
    $linux ($root)/boot/kernel cdroot root=live:CDLABEL=COS_LIVE rd.live.dir=/ rd.live.squashimg=rootfs.squashfs net.ifnames=1 console=tty1 console=ttyS0 rd.cos.disable selinux=0 rd.live.overlay.overlayfs rd.immucore.sysrootwait=600 systemd.unified_cgroup_hierarchy=1
    echo Loading initrd...
    $initrd ($root)/boot/initrd
}

menuentry "Palette Edge Interactive Installer" --class os --unrestricted {
    echo Loading kernel...
    $linux ($root)/boot/kernel cdroot root=live:CDLABEL=COS_LIVE rd.live.dir=/ rd.live.squashimg=rootfs.squashfs net.ifnames=1 console=tty1 console=ttyS0 rd.cos.disable vga=795 nomodeset nodepair.enable selinux=0 rd.live.overlay.overlayfs rd.immucore.sysrootwait=600 systemd.unified_cgroup_hierarchy=1 interactive-install
    echo Loading initrd...
    $initrd ($root)/boot/initrd
}

menuentry "Palette Edge Debug Install (verbose - AUTO log capture)" --class os --unrestricted {
    echo ""
    echo "==================================================================="
    echo ">>> START your serial console / screen recording NOW <<<"
    echo "Verbose debug logs will print to this console during install."
    echo "If a writable USB/disk is attached, a compressed log bundle is"
    echo "also saved to it (path shown on screen). No action is required;"
    echo "log collection runs automatically if the install fails or stalls."
    echo "==================================================================="
    sleep --verbose --interruptible 10
    echo "Loading kernel (debug)..."
    $linux ($root)/boot/kernel cdroot root=live:CDLABEL=COS_LIVE rd.live.dir=/ rd.live.squashimg=rootfs.squashfs net.ifnames=1 console=tty1 console=ttyS0,115200 rd.cos.disable nodepair.enable selinux=0 rd.live.overlay.overlayfs rd.immucore.sysrootwait=600 systemd.unified_cgroup_hierarchy=1 palette.debug=1 rd.debug rd.udev.debug udev.log_level=debug rd.immucore.debug rd.driver.pre=nvme,nvme_core,ahci,megaraid_sas,mpt3sas,iscsi_tcp,libiscsi,scsi_transport_iscsi,usb_storage systemd.log_level=debug systemd.log_target=console
    echo "Loading initrd..."
    $initrd ($root)/boot/initrd
}

if [ "${grub_platform}" = "efi" ]; then
    hiddenentry "Text mode" --hotkey "t" {
        set textmode=true
        terminal_output console
    }
fi
