name: Build Kairos Init Base Images

on:
  workflow_dispatch:
    inputs:
      base_os_image:
        description: 'Base OS Image (leave empty for default combinations)'
        required: false
        type: string
        default: ''
      kairos_init_image:
        description: 'Kairos Init Image'
        required: false
        type: string
        default: 'quay.io/kairos/kairos-init:v0.5.1'
      arch:
        description: 'Architecture'
        required: false
        type: choice
        options:
          - amd64
          - arm64
        default: 'amd64'
      model:
        description: 'Model'
        required: false
        type: string
        default: 'generic'
      kairos_version:
        description: 'Kairos Version'
        required: false
        type: string
        default: 'v3.4.2'
      trusted_boot:
        description: 'Trusted Boot'
        required: false
        type: boolean
        default: false
      registry_prefix:
        description: 'Registry prefix for output images'
        required: false
        type: string
        default: 'us-east1-docker.pkg.dev/spectro-images/dev/piyush/edge'

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: set-matrix
        run: |
          if [ -n "${{ github.event.inputs.base_os_image }}" ]; then
            BASE_OS="${{ github.event.inputs.base_os_image }}"
            
            SIMPLE_NAME=$(echo "$BASE_OS" | sed 's/.*\///g' | sed 's/:/-/g')
            TAG="${{ github.event.inputs.registry_prefix }}/kairos-custom:${SIMPLE_NAME}-core-${{ github.event.inputs.arch }}-${{ github.event.inputs.model }}-${{ github.event.inputs.kairos_version }}"
            
            if [ "${{ github.event.inputs.trusted_boot }}" = "true" ]; then
              TAG="${TAG}-uki"
            fi
            
            MATRIX='[{"base_os": "'$BASE_OS'", "tag": "'$TAG'"}]'
          else
            # Default combinations
            REGISTRY_PREFIX="${{ github.event.inputs.registry_prefix }}"
            ARCH="${{ github.event.inputs.arch }}"
            MODEL="${{ github.event.inputs.model }}"
            VERSION="${{ github.event.inputs.kairos_version }}"
            TRUSTED_BOOT="${{ github.event.inputs.trusted_boot }}"
            
            if [ "$TRUSTED_BOOT" = "true" ]; then
              MATRIX='[
                {
                  "base_os": "ubuntu:24.04",
                  "tag": "'$REGISTRY_PREFIX'/kairos-ubuntu:24.04-core-'$ARCH'-'$MODEL'-'$VERSION'-uki"
                }
              ]'
            else
              MATRIX='[
                {
                  "base_os": "ubuntu:20.04",
                  "tag": "'$REGISTRY_PREFIX'/edge/kairos-ubuntu:20.04-core-'$ARCH'-'$MODEL'-'$VERSION'"
                }
              ]'
            fi
          fi
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Generated matrix:"
          echo "$MATRIX" | jq .

  kairosify:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false
    outputs:
      tags: ${{ steps.collect-tags.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to gcr
        run: echo "${{ secrets.US_EAST_JSON_KEY_B64 }}" | base64 -d  | sudo docker login -u _json_key --password-stdin us-east1-docker.pkg.dev

      - name: Build and push kairosify image
        uses: docker/bake-action@v6
        with:
          files: docker-bake.hcl
          targets: kairosify
          push: true
          set: |
            kairosify.platforms=linux/${{ github.event.inputs.arch }}
            kairosify.args.BASE_OS_IMAGE=${{ matrix.base_os }}
            kairosify.args.KAIROS_INIT_IMAGE=${{ github.event.inputs.kairos_init_image }}
            kairosify.args.KAIROS_VERSION=${{ github.event.inputs.kairos_version }}
            kairosify.args.TRUSTED_BOOT=${{ github.event.inputs.trusted_boot }}
            kairosify.args.MODEL=${{ github.event.inputs.model }}
            kairosify.tags=${{ matrix.tag }}

      - name: Collect tags for output
        id: collect-tags
        run: |
          echo "Built and pushed: ${{ matrix.tag }}"
          # Store tag in a file for later collection
          echo "${{ matrix.tag }}" >> /tmp/built_tags.txt

      - name: Upload built tags
        uses: actions/upload-artifact@v4
        with:
          name: built-tags-${{ strategy.job-index }}
          path: /tmp/built_tags.txt

  collect-outputs:
    needs: kairosify
    runs-on: ubuntu-latest
    outputs:
      built_tags: ${{ steps.combine-tags.outputs.tags }}
    steps:
      - name: Download all tag artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: built-tags-*
          merge-multiple: true
          path: /tmp/tags

      - name: Combine all tags
        id: combine-tags
        run: |
          # Combine all tag files into a single JSON array
          TAGS="["
          FIRST=true
          for file in /tmp/tags/*.txt; do
            if [ -f "$file" ]; then
              while IFS= read -r tag; do
                if [ "$FIRST" = true ]; then
                  TAGS="$TAGS\"$tag\""
                  FIRST=false
                else
                  TAGS="$TAGS,\"$tag\""
                fi
              done < "$file"
            fi
          done
          TAGS="$TAGS]"
          
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "All built tags:"
          echo "$TAGS" | jq .

      - name: Summary
        run: |
          echo "## Kairosify Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Input Parameters:**" >> $GITHUB_STEP_SUMMARY
          echo "- Base OS Image: ${{ github.event.inputs.base_os_image || 'Default combinations' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Kairos Init Image: ${{ github.event.inputs.kairos_init_image }}" >> $GITHUB_STEP_SUMMARY
          echo "- Architecture: ${{ github.event.inputs.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "- Model: ${{ github.event.inputs.model }}" >> $GITHUB_STEP_SUMMARY
          echo "- Kairos Version: ${{ github.event.inputs.kairos_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trusted Boot: ${{ github.event.inputs.trusted_boot }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Built Images:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.combine-tags.outputs.tags }}' | jq -r '.[] | "- " + .' >> $GITHUB_STEP_SUMMARY