name: Providers - Bump Go version

# Fan-out: edits the Go version in every provider repo for the chosen release
# line and opens a PR against that line's base branch. Does NOT merge.
#
# Requires repo/org secret PROVIDER_AUTOMATION_TOKEN: a GitHub App token or
# fine-grained PAT with contents:write + pull-requests:write on the
# kairos-io/provider-* repositories (CanvOS lives in a different org, so the
# default GITHUB_TOKEN cannot reach them).

on:
  workflow_dispatch:
    inputs:
      go_version:
        description: "Target Go version, e.g. 1.26.4"
        required: true
        type: string
      line:
        description: "Release line to target"
        required: true
        type: choice
        options: ["4.8", "4.7"]
      ticket:
        description: "Jira ticket id for the branch/PR title (optional)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.gen.outputs.include }}
    steps:
      - uses: actions/checkout@v4
      - id: gen
        name: Build matrix from providers.json
        run: |
          line='${{ inputs.line }}'
          include=$(jq -c --arg line "$line" '
            [ .providers[]
              | select(.branches[$line] != null)
              | {repo: .repo, branch: .branches[$line]} ]' \
            .github/provider-automation/providers.json)
          echo "include=$include" >> "$GITHUB_OUTPUT"
          echo "$include" | jq .

  bump:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    steps:
      - name: Checkout CanvOS (for the bump script)
        uses: actions/checkout@v4
        with:
          path: _canvos

      - name: Checkout ${{ matrix.repo }}@${{ matrix.branch }}
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          ref: ${{ matrix.branch }}
          token: ${{ secrets.PROVIDER_AUTOMATION_TOKEN }}
          path: provider
          fetch-depth: 0

      - name: Apply Go bump
        id: bump
        working-directory: provider
        run: bash "$GITHUB_WORKSPACE/_canvos/.github/provider-automation/bump-go.sh" "${{ inputs.go_version }}"

      - name: Commit, push & open PR
        working-directory: provider
        env:
          GH_TOKEN: ${{ secrets.PROVIDER_AUTOMATION_TOKEN }}
          GO_VERSION: ${{ inputs.go_version }}
          BASE_BRANCH: ${{ matrix.branch }}
          TICKET: ${{ inputs.ticket }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes for ${{ matrix.repo }} (already on Go ${GO_VERSION}); skipping PR."
            exit 0
          fi
          slug="${TICKET:-auto-go-${GO_VERSION}}"
          head="${slug}/go-${GO_VERSION}"
          title="${TICKET:+$TICKET: }Upgrade go to ${GO_VERSION}"

          git config user.name  "spectro-automation[bot]"
          git config user.email "automation@spectrocloud.com"
          git checkout -b "$head"
          git commit -am "$title"
          git push -u origin "$head" --force-with-lease

          # Reuse an existing open PR for this head if present, else create one.
          if gh pr view "$head" --json url --jq .url 2>/dev/null; then
            echo "PR already exists for $head"
          else
            gh pr create \
              --base "$BASE_BRANCH" --head "$head" \
              --title "$title" \
              --body "Automated Go toolchain bump to **${GO_VERSION}** (line ${{ inputs.line }}, base \`${BASE_BRANCH}\`).

Generated by CanvOS workflow \`providers-bump-go\`. No \`go.sum\` change is expected (toolchain directive only)."
          fi
